# Frontend workspace apps — typecheck + production build both products.
name: Frontend workspaces

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/frontend.yml"
      - "frontend/**"
  pull_request:
    paths:
      - ".github/workflows/frontend.yml"
      - "frontend/**"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [portfolio, clinic]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npm run type-check -w @mdc/${{ matrix.app }}

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000
          VITE_API_KEY: ci-placeholder
          VITE_IS_DEMO: ${{ matrix.app == 'portfolio' && 'true' || 'false' }}
        run: npm run build -w @mdc/${{ matrix.app }}
