services:
  # Airflow Compose sandbox (Phase A / laptop Option A experiments).
  # Prefer native Airflow for clinic nightly. Do not treat this stack as a
  # production clinic host — host.docker.internal can reach host-bound DBs when
  # stage env files are mounted.
  # ETL/dbt connection vars are intentionally NOT injected here (would override stage files).
  airflow-api-server:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    depends_on:
      - postgres
      - mysql
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DATABASE}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
      - AIRFLOW__API_AUTH__JWT_SECRET=${AIRFLOW_JWT_SECRET:-${AIRFLOW_FERNET_KEY}}
      - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      # Nightly DAG at 9 PM Central (cron "0 21 * * *" interpreted in this timezone)
      - AIRFLOW__CORE__DEFAULT_TIMEZONE=America/Chicago
      # Task SDK must reach api-server by Compose DNS (not localhost)
      - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow-api-server:8080/execution/
      - MDC_IN_DOCKER=1
      - MDC_HOST_GATEWAY=host.docker.internal
      - MDC_ETL_PYTHON=/opt/airflow/venvs/etl/bin/python
      - MDC_DBT_PYTHON=/opt/airflow/venvs/dbt-python
      - MDC_DBT_EXECUTABLE=/opt/airflow/venvs/dbt
      # Option A laptop: clinic OD source + local warehouse (publish still uses RDS + tunnel)
      - MDC_CLINIC_WAREHOUSE=local
      # Email Configuration for Monitoring (optional)
      - SMTP_SERVER=${SMTP_SERVER:-localhost}
      - SMTP_PORT=${SMTP_PORT:-587}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - ALERT_RECIPIENTS=${ALERT_RECIPIENTS}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/scripts:/opt/airflow/scripts
      - ./config:/opt/airflow/config
      - ./etl_job:/opt/airflow/dags/etl_job
      # Project root for ETL + dbt + mdc (Phase A Compose / LocalExecutor)
      - ./etl_pipeline:/opt/airflow/dbt_dental_clinic/etl_pipeline
      - ./dbt_dental_models:/opt/airflow/dbt_dental_clinic/dbt_dental_models
      - ./tools:/opt/airflow/dbt_dental_clinic/tools
      # No deployment_credentials.json here — UI does not run ETL; secrets stay on scheduler.
    ports:
      # Localhost only; 8081 avoids Windows ghost listener on 8080 after native Airflow
      - "127.0.0.1:8081:8080"
    command: api-server
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health" ]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    depends_on:
      - postgres
      - mysql
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DATABASE}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
      - AIRFLOW__API_AUTH__JWT_SECRET=${AIRFLOW_JWT_SECRET:-${AIRFLOW_FERNET_KEY}}
      - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      - AIRFLOW__CORE__DEFAULT_TIMEZONE=America/Chicago
      # Task SDK must reach api-server by Compose DNS (not localhost)
      - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow-api-server:8080/execution/
      - MDC_IN_DOCKER=1
      - MDC_HOST_GATEWAY=host.docker.internal
      - MDC_ETL_PYTHON=/opt/airflow/venvs/etl/bin/python
      - MDC_DBT_PYTHON=/opt/airflow/venvs/dbt-python
      - MDC_DBT_EXECUTABLE=/opt/airflow/venvs/dbt
      - MDC_CLINIC_WAREHOUSE=local
      # Email Configuration for Monitoring (optional)
      - SMTP_SERVER=${SMTP_SERVER:-localhost}
      - SMTP_PORT=${SMTP_PORT:-587}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - ALERT_RECIPIENTS=${ALERT_RECIPIENTS}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/scripts:/opt/airflow/scripts
      - ./config:/opt/airflow/config
      - ./etl_job:/opt/airflow/dags/etl_job
      - ./etl_pipeline:/opt/airflow/dbt_dental_clinic/etl_pipeline
      - ./dbt_dental_models:/opt/airflow/dbt_dental_clinic/dbt_dental_models
      - ./tools:/opt/airflow/dbt_dental_clinic/tools
      # LocalExecutor runs tasks here — clinic RDS metadata for schema refresh / publish path
      - ./deployment_credentials.json:/opt/airflow/dbt_dental_clinic/deployment_credentials.json:ro
    command: scheduler

  airflow-dag-processor:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    depends_on:
      - postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DATABASE}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
      - AIRFLOW__API_AUTH__JWT_SECRET=${AIRFLOW_JWT_SECRET:-${AIRFLOW_FERNET_KEY}}
      - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      - AIRFLOW__CORE__DEFAULT_TIMEZONE=America/Chicago
      - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow-api-server:8080/execution/
      - MDC_IN_DOCKER=1
      - MDC_HOST_GATEWAY=host.docker.internal
      - MDC_ETL_PYTHON=/opt/airflow/venvs/etl/bin/python
      - MDC_DBT_PYTHON=/opt/airflow/venvs/dbt-python
      - MDC_DBT_EXECUTABLE=/opt/airflow/venvs/dbt
      - MDC_CLINIC_WAREHOUSE=local
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/scripts:/opt/airflow/scripts
      - ./config:/opt/airflow/config
      - ./etl_job:/opt/airflow/dags/etl_job
      - ./etl_pipeline:/opt/airflow/dbt_dental_clinic/etl_pipeline
      - ./dbt_dental_models:/opt/airflow/dbt_dental_clinic/dbt_dental_models
      - ./tools:/opt/airflow/dbt_dental_clinic/tools
      # No credentials — dag-processor only parses DAGs; tasks run on scheduler.
    command: dag-processor

  # Airflow Init (run once to initialize database)
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DATABASE}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
      - AIRFLOW__API_AUTH__JWT_SECRET=${AIRFLOW_JWT_SECRET:-${AIRFLOW_FERNET_KEY}}
      - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      # SECURITY: Airflow admin credentials from environment
      - AIRFLOW_ADMIN_USERNAME=${AIRFLOW_ADMIN_USERNAME}
      - AIRFLOW_ADMIN_PASSWORD=${AIRFLOW_ADMIN_PASSWORD}
      - AIRFLOW_ADMIN_EMAIL=${AIRFLOW_ADMIN_EMAIL:-admin@localhost}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./scripts/airflow:/opt/airflow/repo-scripts:ro
    entrypoint: ["/bin/bash", "/opt/airflow/repo-scripts/compose-init.sh"]
    profiles:
      - init # Only run when specifically called

  # Existing dbt service
  dbt:
    build: .
    volumes:
      - .:/usr/app/dbt
      - ~/.dbt:/root/.dbt
    env_file:
      - .env
    environment:
      - DBT_PROFILES_DIR=/usr/app/dbt
      - DBT_PROJECT_DIR=/usr/app/dbt
    depends_on:
      - postgres
      - mysql
    command: dbt run
    profiles:
      - manual # Only run when specifically called

  # Database services
  postgres:
    # Local cache already has 18; mount parent dir per PG18+ image layout.
    image: postgres:18
    env_file:
      - .env
    # Do not publish 5432 — host already runs analytics Postgres for Phase A test.
    # Airflow metadata uses the Compose network hostname `postgres`.
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./sql/init:/docker-entrypoint-initdb.d # For initialization scripts
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DATABASE}
      - POSTGRES_HOST_AUTH_METHOD=scram-sha-256 # Secure authentication
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DATABASE}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.4
    env_file:
      - .env
    # Removed port exposure for security - access via Docker network only
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_ROOT_USER=${MYSQL_ROOT_USER}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
    user: "999:999" # Run as mysql user (non-root)

volumes:
  postgres_data:
  mysql_data:
