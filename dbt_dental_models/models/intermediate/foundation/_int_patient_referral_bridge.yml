version: 2

models:
  - name: int_patient_referral_bridge
    description: >
      Patient–referral attribution from OpenDental refattach, one row per patient_id and referral_id
      with first/latest attach dates. Use for cohorts; excludes rows with null patient, referral, or date.
    columns:
      - name: patient_id
        tests:
          - not_null
      - name: referral_id
        tests:
          - not_null
      - name: first_referral_date
        tests:
          - not_null
      - name: latest_referral_date
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - patient_id
            - referral_id
