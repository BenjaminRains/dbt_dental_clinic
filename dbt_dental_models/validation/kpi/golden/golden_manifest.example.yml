# Copy to golden_manifest.yml and fill in after exporting from OpenDental.
# Commit golden_manifest.yml only if it contains aggregate totals — never row-level PHI.
# CSV exports stay in this folder; repo .gitignore excludes *.csv.

version: 1

validation_window:
  window_id: pilot_2025h2
  date_from: "2025-07-01"
  date_to: "2026-06-12"

snapshots:
  - id: daily_payments_pilot
    status: not_started
    od_report: Daily Payments
    od_menu_path: "Reports → Standard → Daily Payments"
    source_file: daily_payments_2025-07-01_2026-06-12_2026-06-25.csv
    exported_at: null
    parameters:
      date_from: "2025-07-01"
      date_to: "2026-06-12"
      clinic_ids: all
      include_insurance: true
    od_totals:
      net_collections: null
      comment: "Sum from OD export total row or manual sum of amount column"
    our_model: mart_daily_payments
    our_query: |
      SELECT SUM(net_collections_amount)
      FROM marts.mart_daily_payments
      WHERE payment_date BETWEEN DATE '2025-07-01' AND DATE '2026-06-12';
    compare_sql: compare/compare_daily_collections.sql
    tolerance:
      amount_abs: 10.00
      pct: 0.005
    last_result: null

  - id: production_by_provider_pilot
    status: not_started
    od_report: Production and Income
    od_menu_path: "Reports → Standard → Production and Income"
    source_file: production_income_2025-07-01_2026-06-12_2026-06-25.csv
    exported_at: null
    parameters:
      date_from: "2025-07-01"
      date_to: "2026-06-12"
      group_by: provider
    od_totals:
      total_production: null
      total_income: null
    our_model: mart_provider_performance
    compare_sql: compare/compare_production_by_provider.sql
    tolerance:
      amount_abs: 50.00
      pct: 0.005
    last_result: null
